<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="420" viewBox="0 0 1280 420" role="img" aria-labelledby="title desc">
  <title id="title">Audio flow</title>
  <desc id="desc">Signal flow diagram from Windows audio through TwinSync processing to two speakers.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#f3c04d"/>
    </marker>
  </defs>
  <rect width="1280" height="420" rx="24" fill="#080a0f"/>
  <text x="52" y="58" fill="#f7fbff" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="800">Audio Flow</text>
  <g font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">
    <g transform="translate(52 135)">
      <rect width="170" height="92" rx="14" fill="#101827" stroke="#48e6b6" stroke-width="2"/>
      <text x="34" y="40" fill="#f7fbff">Windows</text>
      <text x="28" y="68" fill="#9fb0c8" font-size="15">system audio</text>
    </g>
    <g transform="translate(282 135)">
      <rect width="190" height="92" rx="14" fill="#101827" stroke="#f3c04d" stroke-width="2"/>
      <text x="38" y="40" fill="#f7fbff">Loopback</text>
      <text x="42" y="68" fill="#9fb0c8" font-size="15">WASAPI capture</text>
    </g>
    <g transform="translate(532 120)">
      <rect width="216" height="122" rx="14" fill="#101827" stroke="#48e6b6" stroke-width="2"/>
      <text x="42" y="42" fill="#f7fbff">TwinSync</text>
      <text x="34" y="72" fill="#9fb0c8" font-size="15">gate, delay, drift</text>
      <text x="52" y="98" fill="#9fb0c8" font-size="15">volume, buffers</text>
    </g>
    <g transform="translate(830 70)">
      <rect width="180" height="92" rx="14" fill="#101827" stroke="#48e6b6" stroke-width="2"/>
      <text x="40" y="40" fill="#f7fbff">Speaker A</text>
      <text x="26" y="68" fill="#9fb0c8" font-size="15">default path guard</text>
    </g>
    <g transform="translate(830 240)">
      <rect width="180" height="92" rx="14" fill="#101827" stroke="#f3c04d" stroke-width="2"/>
      <text x="40" y="40" fill="#f7fbff">Speaker B</text>
      <text x="32" y="68" fill="#9fb0c8" font-size="15">render worker</text>
    </g>
    <g transform="translate(1082 155)">
      <rect width="150" height="92" rx="14" fill="#101827" stroke="#ec538b" stroke-width="2"/>
      <text x="30" y="40" fill="#f7fbff">Profiles</text>
      <text x="30" y="68" fill="#9fb0c8" font-size="15">SQLite</text>
    </g>
  </g>
  <g stroke="#f3c04d" stroke-width="4" fill="none" marker-end="url(#arrow)">
    <path d="M222 181 H276"/>
    <path d="M472 181 H526"/>
    <path d="M748 181 C786 162 796 126 824 116"/>
    <path d="M748 181 C786 206 796 276 824 286"/>
    <path d="M1082 201 H1002"/>
  </g>
</svg>

