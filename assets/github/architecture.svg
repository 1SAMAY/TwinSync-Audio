<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="520" viewBox="0 0 1280 520" role="img" aria-labelledby="title desc">
  <title id="title">TwinSync architecture</title>
  <desc id="desc">Architecture diagram showing React, Tauri, Python backend, SQLite, and Windows audio.</desc>
  <defs>
    <linearGradient id="panel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#101827"/>
      <stop offset="1" stop-color="#0c1118"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#48e6b6"/>
    </marker>
  </defs>
  <rect width="1280" height="520" rx="24" fill="#080a0f"/>
  <text x="56" y="58" fill="#f7fbff" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="800">Architecture</text>
  <text x="56" y="90" fill="#9fb0c8" font-family="Segoe UI, Arial, sans-serif" font-size="17">All communication stays on the local machine.</text>
  <g fill="url(#panel)" stroke="#26364a" stroke-width="2">
    <rect x="56" y="140" width="250" height="240" rx="16"/>
    <rect x="376" y="140" width="250" height="240" rx="16"/>
    <rect x="696" y="140" width="250" height="240" rx="16"/>
    <rect x="1016" y="140" width="208" height="240" rx="16"/>
  </g>
  <g font-family="Segoe UI, Arial, sans-serif">
    <text x="92" y="190" fill="#48e6b6" font-size="24" font-weight="800">React UI</text>
    <text x="92" y="228" fill="#dbe6f3" font-size="17">Dashboard</text>
    <text x="92" y="258" fill="#dbe6f3" font-size="17">Device Manager</text>
    <text x="92" y="288" fill="#dbe6f3" font-size="17">Delay Controls</text>
    <text x="92" y="318" fill="#dbe6f3" font-size="17">Profiles</text>
    <text x="412" y="190" fill="#f3c04d" font-size="24" font-weight="800">Tauri Shell</text>
    <text x="412" y="228" fill="#dbe6f3" font-size="17">Desktop Window</text>
    <text x="412" y="258" fill="#dbe6f3" font-size="17">Rust IPC Bridge</text>
    <text x="412" y="288" fill="#dbe6f3" font-size="17">Python Sidecar</text>
    <text x="732" y="190" fill="#48e6b6" font-size="24" font-weight="800">Python Backend</text>
    <text x="732" y="228" fill="#dbe6f3" font-size="17">Device Discovery</text>
    <text x="732" y="258" fill="#dbe6f3" font-size="17">Audio Engine</text>
    <text x="732" y="288" fill="#dbe6f3" font-size="17">Calibration</text>
    <text x="732" y="318" fill="#dbe6f3" font-size="17">SQLite Service</text>
    <text x="1046" y="190" fill="#ec538b" font-size="24" font-weight="800">Windows</text>
    <text x="1046" y="228" fill="#dbe6f3" font-size="17">WASAPI</text>
    <text x="1046" y="258" fill="#dbe6f3" font-size="17">Audio Devices</text>
    <text x="1046" y="288" fill="#dbe6f3" font-size="17">Bluetooth Stack</text>
  </g>
  <g stroke="#48e6b6" stroke-width="4" fill="none" marker-end="url(#arrow)">
    <path d="M306 260 H370"/>
    <path d="M626 260 H690"/>
    <path d="M946 260 H1010"/>
  </g>
  <g transform="translate(696 410)">
    <rect width="250" height="58" rx="12" fill="#101827" stroke="#26364a"/>
    <text x="34" y="36" fill="#dbe6f3" font-family="Segoe UI, Arial, sans-serif" font-size="18">SQLite: profiles, settings, log</text>
  </g>
</svg>

