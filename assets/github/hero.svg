<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="420" viewBox="0 0 1280 420" role="img" aria-labelledby="title desc">
  <title id="title">TwinSync Audio</title>
  <desc id="desc">Dark hero graphic showing Windows audio routed through TwinSync to two speakers.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#080a0f"/>
      <stop offset="0.5" stop-color="#111827"/>
      <stop offset="1" stop-color="#071511"/>
    </linearGradient>
    <linearGradient id="lineA" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#48e6b6"/>
      <stop offset="1" stop-color="#ec538b"/>
    </linearGradient>
    <linearGradient id="lineB" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#48e6b6"/>
      <stop offset="1" stop-color="#f3c04d"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1280" height="420" rx="28" fill="url(#bg)"/>
  <circle cx="1120" cy="80" r="180" fill="#ec538b" opacity="0.06"/>
  <circle cx="170" cy="330" r="180" fill="#48e6b6" opacity="0.08"/>

  <g transform="translate(70, 50)">
    <text x="0" y="40" fill="#48e6b6" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" letter-spacing="1.5">LOCAL WINDOWS AUDIO SYNC</text>
    <text x="0" y="115" fill="#f7fbff" font-family="Segoe UI, Arial, sans-serif" font-size="64" font-weight="800">TwinSync Audio</text>
    <text x="0" y="165" fill="#b8c4d6" font-family="Segoe UI, Arial, sans-serif" font-size="20">Play one Windows audio stream through two speakers</text>
    <text x="0" y="195" fill="#b8c4d6" font-family="Segoe UI, Arial, sans-serif" font-size="20">with practical delay compensation.</text>
    
    <g transform="translate(0, 240)">
      <g transform="translate(0, 0)">
        <rect width="140" height="40" rx="10" fill="#48e6b6" opacity="0.15" stroke="#48e6b6" stroke-width="1.5"/>
        <text x="70" y="25" fill="#f7fbff" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" text-anchor="middle">100% Local</text>
      </g>
      <g transform="translate(160, 0)">
        <rect width="140" height="40" rx="10" fill="#f3c04d" opacity="0.15" stroke="#f3c04d" stroke-width="1.5"/>
        <text x="70" y="25" fill="#f7fbff" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" text-anchor="middle">SQLite Profiles</text>
      </g>
      <g transform="translate(320, 0)">
        <rect width="140" height="40" rx="10" fill="#ec538b" opacity="0.15" stroke="#ec538b" stroke-width="1.5"/>
        <text x="70" y="25" fill="#f7fbff" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" text-anchor="middle">Tauri Desktop</text>
      </g>
    </g>
  </g>

  <g transform="translate(680, 85)" filter="url(#glow)">
    
    <path d="M 90,125 L 170,125" fill="none" stroke="#48e6b6" stroke-width="4" stroke-linecap="round"/>
    <path d="M 320,125 C 365,125 365,35 410,35" fill="none" stroke="url(#lineA)" stroke-width="4" stroke-linecap="round"/>
    <path d="M 320,125 C 365,125 365,215 410,215" fill="none" stroke="url(#lineB)" stroke-width="4" stroke-linecap="round"/>

    <g transform="translate(0, 50)">
      <rect width="90" height="150" rx="16" fill="#0b1118" stroke="#b8c4d6" stroke-width="1.5"/>
      <circle cx="45" cy="45" r="18" fill="#48e6b6" opacity="0.2"/>
      <path d="M40 45 L50 45 M45 40 L45 50" stroke="#48e6b6" stroke-width="2"/>
      <circle cx="45" cy="95" r="14" fill="#f3c04d" opacity="0.15"/>
      <text x="45" y="132" fill="#b8c4d6" font-family="Segoe UI, Arial, sans-serif" font-size="13" text-anchor="middle" font-weight="600">Windows</text>
    </g>

    <g transform="translate(170, 70)">
      <rect width="150" height="110" rx="18" fill="#111827" stroke="#48e6b6" stroke-width="2.5"/>
      <text x="75" y="62" fill="#f7fbff" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="800" text-anchor="middle" letter-spacing="0.5">TwinSync</text>
    </g>

    <g transform="translate(410, -40)">
      <rect width="90" height="150" rx="16" fill="#0b1118" stroke="#ec538b" stroke-width="1.5"/>
      <circle cx="45" cy="45" r="22" fill="#ec538b" opacity="0.15"/>
      <circle cx="45" cy="45" r="8" fill="#ec538b" opacity="0.4"/>
      <circle cx="45" cy="100" r="16" fill="#48e6b6" opacity="0.15"/>
      <text x="45" y="132" fill="#b8c4d6" font-family="Segoe UI, Arial, sans-serif" font-size="13" text-anchor="middle" font-weight="600">Speaker A</text>
    </g>

    <g transform="translate(410, 140)">
      <rect width="90" height="150" rx="16" fill="#0b1118" stroke="#f3c04d" stroke-width="1.5"/>
      <circle cx="45" cy="45" r="22" fill="#f3c04d" opacity="0.15"/>
      <circle cx="45" cy="45" r="8" fill="#f3c04d" opacity="0.4"/>
      <circle cx="45" cy="100" r="16" fill="#48e6b6" opacity="0.15"/>
      <text x="45" y="132" fill="#b8c4d6" font-family="Segoe UI, Arial, sans-serif" font-size="13" text-anchor="middle" font-weight="600">Speaker B</text>
    </g>
    
  </g>
</svg>
